<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir - Toko Aisyah</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --plum: #3b0764;
    --violet: #6d28d9;
    --lavender: #a78bfa;
    --lilac: #ddd6fe;
    --blush: #f5f3ff;
    --gold: #f59e0b;
    --gold-light: #fef3c7;
    --rose: #ec4899;
    --green: #10b981;
    --red: #ef4444;
    --white: #ffffff;
    --gray-50: #fafafa;
    --gray-100: #f4f4f5;
    --gray-200: #e4e4e7;
    --gray-400: #a1a1aa;
    --gray-600: #52525b;
    --gray-800: #27272a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--plum);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== BACKGROUND DECORATION ===== */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(167,139,250,0.15) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(167,139,250,0.2);
    padding: 0 24px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--violet), var(--rose));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 20px rgba(109,40,217,0.5);
  }
  .logo-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 800;
    color: var(--white);
    line-height: 1;
  }
  .logo-text span {
    font-size: 11px; font-weight: 400;
    color: var(--lavender);
    letter-spacing: 2px; text-transform: uppercase;
  }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }
  .datetime {
    text-align: right;
    color: var(--lavender);
    font-size: 12px;
  }
  .datetime .time {
    font-size: 18px; font-weight: 600; color: var(--white);
    font-family: 'Playfair Display', serif;
  }
  .cashier-badge {
    background: rgba(167,139,250,0.15);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 20px;
    padding: 6px 14px;
    color: var(--lavender);
    font-size: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .cashier-badge::before {
    content: '●'; color: var(--green); font-size: 8px;
  }

  /* ===== MAIN LAYOUT ===== */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    height: calc(100vh - 64px);
    position: relative; z-index: 1;
  }

  /* ===== LEFT PANEL - PRODUCTS ===== */
  .products-panel {
    padding: 20px 24px;
    overflow-y: auto;
    background: rgba(255,255,255,0.02);
  }
  .products-panel::-webkit-scrollbar { width: 4px; }
  .products-panel::-webkit-scrollbar-track { background: transparent; }
  .products-panel::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 2px; }

  .search-bar {
    position: relative; margin-bottom: 20px;
  }
  .search-bar input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 12px;
    padding: 12px 16px 12px 44px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }
  .search-bar input::placeholder { color: rgba(167,139,250,0.5); }
  .search-bar input:focus {
    border-color: var(--lavender);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: rgba(167,139,250,0.6); font-size: 17px; pointer-events: none;
  }

  /* Category tabs */
  .categories {
    display: flex; gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .cat-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(167,139,250,0.3);
    background: transparent;
    color: var(--lavender);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .cat-btn:hover { background: rgba(167,139,250,0.1); border-color: var(--lavender); }
  .cat-btn.active {
    background: var(--violet);
    border-color: var(--violet);
    color: var(--white);
    box-shadow: 0 4px 12px rgba(109,40,217,0.4);
  }

  .section-label {
    font-size: 11px; font-weight: 600;
    color: var(--lavender);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Product grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .product-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 16px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    gap: 8px;
  }
  .product-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--violet), var(--rose));
    opacity: 0; transition: opacity 0.2s;
  }
  .product-card:hover {
    background: rgba(109,40,217,0.2);
    border-color: rgba(167,139,250,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .product-card:hover::before { opacity: 1; }
  .product-card:active { transform: scale(0.97); }

  .product-card .emoji {
    font-size: 32px; line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
  .product-card .name {
    font-size: 12px; font-weight: 600;
    color: var(--white);
    line-height: 1.3;
  }
  .product-card .price {
    font-size: 11px; font-weight: 700;
    color: var(--gold);
    background: rgba(245,158,11,0.1);
    border-radius: 6px;
    padding: 3px 8px;
  }
  .product-card .stock-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    color: var(--white);
  }
  .stock-badge.ok { background: rgba(16,185,129,0.3); color: #6ee7b7; }
  .stock-badge.low { background: rgba(245,158,11,0.3); color: #fcd34d; }

  /* ===== RIGHT PANEL - CART ===== */
  .cart-panel {
    background: rgba(255,255,255,0.04);
    border-left: 1px solid rgba(167,139,250,0.15);
    display: flex; flex-direction: column;
  }

  .cart-header {
    padding: 18px 20px;
    border-bottom: 1px solid rgba(167,139,250,0.15);
    display: flex; align-items: center; justify-content: space-between;
  }
  .cart-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700;
    color: var(--white);
    display: flex; align-items: center; gap: 8px;
  }
  .cart-count {
    background: var(--violet);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 700;
    min-width: 22px; height: 22px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 6px;
  }
  .clear-btn {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 6px 12px;
    color: #fca5a5;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { background: rgba(239,68,68,0.2); }

  /* Cart items */
  .cart-items {
    flex: 1; overflow-y: auto;
    padding: 12px 16px;
  }
  .cart-items::-webkit-scrollbar { width: 4px; }
  .cart-items::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 2px; }

  .empty-cart {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    color: rgba(167,139,250,0.4);
    gap: 12px;
  }
  .empty-cart .icon { font-size: 48px; }
  .empty-cart p { font-size: 13px; }

  .cart-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(167,139,250,0.12);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .cart-item .item-emoji { font-size: 24px; }
  .cart-item .item-info { flex: 1; min-width: 0; }
  .cart-item .item-name {
    font-size: 12px; font-weight: 600;
    color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cart-item .item-price {
    font-size: 11px; color: var(--gold); font-weight: 600;
  }
  .qty-controls {
    display: flex; align-items: center; gap: 6px;
  }
  .qty-btn {
    width: 26px; height: 26px;
    border-radius: 8px;
    border: 1px solid rgba(167,139,250,0.3);
    background: rgba(109,40,217,0.2);
    color: var(--lavender);
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn:hover { background: var(--violet); color: var(--white); border-color: var(--violet); }
  .qty-btn.minus:hover { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.5); color: #fca5a5; }
  .qty-num {
    font-size: 13px; font-weight: 700;
    color: var(--white); min-width: 20px; text-align: center;
  }

  /* Cart footer */
  .cart-footer {
    padding: 16px;
    border-top: 1px solid rgba(167,139,250,0.15);
    background: rgba(0,0,0,0.15);
  }

  .summary-row {
    display: flex; justify-content: space-between;
    align-items: center; padding: 4px 0;
  }
  .summary-row .label { font-size: 13px; color: var(--lavender); }
  .summary-row .val { font-size: 13px; color: var(--white); font-weight: 500; }
  .summary-row.total {
    border-top: 1px solid rgba(167,139,250,0.2);
    margin-top: 8px; padding-top: 12px;
  }
  .summary-row.total .label {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 700; color: var(--white);
  }
  .summary-row.total .val {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 800; color: var(--gold);
  }

  /* Payment section */
  .payment-section { margin-top: 12px; }
  .pay-label { font-size: 12px; color: var(--lavender); margin-bottom: 6px; font-weight: 500; }
  .pay-input-wrap { position: relative; margin-bottom: 8px; }
  .pay-input-wrap span {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--gold); font-weight: 700; font-size: 14px;
  }
  .pay-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 10px;
    padding: 10px 12px 10px 32px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    outline: none;
    transition: all 0.2s;
  }
  .pay-input:focus { border-color: var(--lavender); box-shadow: 0 0 0 3px rgba(167,139,250,0.1); }

  .kembalian {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.25);
    border-radius: 10px;
    padding: 8px 12px;
    display: flex; justify-content: space-between;
    margin-bottom: 12px;
  }
  .kembalian .label { font-size: 12px; color: #6ee7b7; }
  .kembalian .val { font-size: 14px; font-weight: 700; color: #6ee7b7; }
  .kembalian.kurang { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); }
  .kembalian.kurang .label, .kembalian.kurang .val { color: #fca5a5; }

  .pay-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--violet), var(--rose));
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: var(--white);
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(109,40,217,0.4);
    letter-spacing: 0.5px;
  }
  .pay-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .pay-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(109,40,217,0.55); }
  .pay-btn:hover::after { background: rgba(255,255,255,0.08); }
  .pay-btn:active { transform: scale(0.98); }
  .pay-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ===== MODAL SUCCESS ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: linear-gradient(145deg, #1e0940, #2d0f5e);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 24px;
    padding: 32px;
    width: 340px;
    text-align: center;
    transform: scale(0.8); transition: transform 0.3s;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .modal-overlay.show .modal { transform: scale(1); }

  .modal .success-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--green), #059669);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin: 0 auto 16px;
    box-shadow: 0 8px 32px rgba(16,185,129,0.4);
    animation: popIn 0.4s 0.1s both;
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px; color: var(--white); margin-bottom: 6px;
  }
  .modal .receipt-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid rgba(167,139,250,0.1);
    font-size: 13px;
  }
  .modal .receipt-row .r-label { color: var(--lavender); }
  .modal .receipt-row .r-val { color: var(--white); font-weight: 600; }
  .modal .receipt-row.big .r-val { color: var(--gold); font-size: 18px; font-weight: 800; font-family: 'Playfair Display', serif; }
  .modal .close-modal-btn {
    margin-top: 20px;
    width: 100%;
    background: linear-gradient(135deg, var(--violet), var(--rose));
    border: none; border-radius: 12px;
    padding: 12px; color: var(--white);
    font-family: 'Playfair Display', serif;
    font-size: 16px; cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(109,40,217,0.4);
  }
  .modal .close-modal-btn:hover { opacity: 0.9; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(109,40,217,0.95);
    border: 1px solid rgba(167,139,250,0.4);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px; font-weight: 600;
    z-index: 2000;
    transition: transform 0.3s;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🌸</div>
    <div class="logo-text">
      <h1>Toko Aisyah</h1>
      <span>Point of Sale</span>
    </div>
  </div>
  <div class="header-right">
    <div class="datetime">
      <div class="time" id="clock">00:00:00</div>
      <div id="dateStr">--</div>
    </div>
    <div class="cashier-badge">Kasir: Aisyah</div>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: Products -->
  <div class="products-panel">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Cari produk...">
    </div>
    <div class="categories" id="categoryBar"></div>
    <div class="section-label" id="sectionLabel">Semua Produk</div>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- RIGHT: Cart -->
  <div class="cart-panel">
    <div class="cart-header">
      <div class="cart-title">
        🛒 Keranjang
        <span class="cart-count" id="cartCount">0</span>
      </div>
      <button class="clear-btn" onclick="clearCart()">🗑 Kosongkan</button>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="empty-cart">
        <div class="icon">🛍️</div>
        <p>Keranjang masih kosong</p>
        <p style="font-size:11px;opacity:0.6">Klik produk untuk menambah</p>
      </div>
    </div>

    <div class="cart-footer">
      <div class="summary-row">
        <span class="label">Subtotal</span>
        <span class="val" id="subtotalVal">Rp 0</span>
      </div>
      <div class="summary-row">
        <span class="label">Diskon</span>
        <span class="val" style="color:#6ee7b7">- Rp 0</span>
      </div>
      <div class="summary-row total">
        <span class="label">TOTAL</span>
        <span class="val" id="totalVal">Rp 0</span>
      </div>

      <div class="payment-section">
        <div class="pay-label">Uang Diterima</div>
        <div class="pay-input-wrap">
          <span>Rp</span>
          <input type="number" class="pay-input" id="payInput" placeholder="0" oninput="calcKembalian()">
        </div>
        <div class="kembalian" id="kembalianBox">
          <span class="label">Kembalian</span>
          <span class="val" id="kembalianVal">Rp 0</span>
        </div>
        <button class="pay-btn" id="payBtn" onclick="processPayment()" disabled>
          ✨ Proses Pembayaran
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="success-icon">✓</div>
    <h2>Transaksi Berhasil!</h2>
    <p style="color:var(--lavender);font-size:12px;margin-bottom:16px">Terima kasih telah berbelanja</p>
    <div id="receiptRows"></div>
    <button class="close-modal-btn" onclick="closeModal()">Transaksi Baru</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== PRODUCTS DATA =====
const products = [
  // SABUN (20 produk)
  { id:1,  name:"Sabun Lifebuoy", emoji:"🧼", price:4500,  category:"Sabun", stock:50 },
  { id:2,  name:"Sabun Lux Rose", emoji:"🌹", price:5000,  category:"Sabun", stock:40 },
  { id:3,  name:"Sabun Dettol", emoji:"🧼", price:6500,  category:"Sabun", stock:35 },
  { id:4,  name:"Sabun Dove", emoji:"🕊️", price:7500,  category:"Sabun", stock:30 },
  { id:5,  name:"Sabun Biore", emoji:"💜", price:8000,  category:"Sabun", stock:25 },
  { id:6,  name:"Sabun Cair Mama", emoji:"🫧", price:12000, category:"Sabun", stock:20 },
  { id:7,  name:"Sabun Cuci Sunlight", emoji:"🍋", price:9000,  category:"Sabun", stock:45 },
  { id:8,  name:"Sabun Attack", emoji:"👕", price:11000, category:"Sabun", stock:30 },
  { id:9,  name:"Sabun Rinso 1kg", emoji:"🫧", price:18000, category:"Sabun", stock:22 },
  { id:10, name:"Sabun So Klin", emoji:"🧹", price:15000, category:"Sabun", stock:28 },

const categories = ["Semua", "Sabun", "Beras", "Sembako", "Bumbu", "Mie", "Minuman", "Cemilan"];
let cart = [];
let activeCategory = "Semua";

// ===== INIT =====
function init() {
  renderCategories();
  renderProducts(products);
  updateClock();
  setInterval(updateClock, 1000);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('id-ID');
  document.getElementById('dateStr').textContent =
    now.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

// ===== CATEGORIES =====
function renderCategories() {
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = categories.map(c =>
    `<button class="cat-btn ${c === activeCategory ? 'active' : ''}" onclick="filterCategory('${c}')">${c}</button>`
  ).join('');
}

function filterCategory(cat) {
  activeCategory = cat;
  renderCategories();
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = cat === "Semua" ? products : products.filter(p => p.category === cat);
  if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
  document.getElementById('sectionLabel').textContent = cat === "Semua" ? "Semua Produk" : cat;
  renderProducts(filtered);
}

// ===== SEARCH =====
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  let filtered = activeCategory === "Semua" ? products : products.filter(p => p.category === activeCategory);
  if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
  renderProducts(filtered);
});

// ===== RENDER PRODUCTS =====
function renderProducts(list) {
  const grid = document.getElementById('productGrid');
  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(167,139,250,0.4)">
      <div style="font-size:40px;margin-bottom:8px">🔍</div>
      <p>Produk tidak ditemukan</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="product-card" onclick="addToCart(${p.id})">
      <span class="stock-badge ${p.stock > 20 ? 'ok' : 'low'}">${p.stock > 20 ? 'Ready' : 'Terbatas'}</span>
      <div class="emoji">${p.emoji}</div>
      <div class="name">${p.name}</div>
      <div class="price">${formatRp(p.price)}</div>
    </div>
  `).join('');
}

// ===== CART =====
function addToCart(id) {
  const prod = products.find(p => p.id === id);
  const existing = cart.find(c => c.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...prod, qty: 1 });
  }
  renderCart();
  showToast(`${prod.emoji} ${prod.name} ditambahkan!`);
}

function changeQty(id, delta) {
  const idx = cart.findIndex(c => c.id === id);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderCart();
}

function clearCart() {
  if (!cart.length) return;
  cart = [];
  renderCart();
  showToast("🗑️ Keranjang dikosongkan");
}

function renderCart() {
  const container = document.getElementById('cartItems');
  const countEl = document.getElementById('cartCount');

  const totalItems = cart.reduce((s, c) => s + c.qty, 0);
  countEl.textContent = totalItems;

  if (!cart.length) {
    container.innerHTML = `<div class="empty-cart">
      <div class="icon">🛍️</div>
      <p>Keranjang masih kosong</p>
      <p style="font-size:11px;opacity:0.6">Klik produk untuk menambah</p>
    </div>`;
    updateTotals(0);
    return;
  }

  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="item-emoji">${item.emoji}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">${formatRp(item.price)} × ${item.qty} = <strong>${formatRp(item.price * item.qty)}</strong></div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn minus" onclick="changeQty(${item.id}, -1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
      </div>
    </div>
  `).join('');

  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  updateTotals(total);
}

function updateTotals(total) {
  document.getElementById('subtotalVal').textContent = formatRp(total);
  document.getElementById('totalVal').textContent = formatRp(total);
  calcKembalian();
  document.getElementById('payBtn').disabled = cart.length === 0;
}

function calcKembalian() {
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const bayar = parseInt(document.getElementById('payInput').value) || 0;
  const kembalian = bayar - total;
  const box = document.getElementById('kembalianBox');
  const val = document.getElementById('kembalianVal');
  const btn = document.getElementById('payBtn');

  if (bayar === 0) {
    val.textContent = 'Rp 0';
    box.className = 'kembalian';
  } else if (kembalian < 0) {
    val.textContent = `- ${formatRp(Math.abs(kembalian))}`;
    box.className = 'kembalian kurang';
    document.querySelector('.kembalian .label').textContent = 'Kurang';
  } else {
    val.textContent = formatRp(kembalian);
    box.className = 'kembalian';
    document.querySelector('.kembalian .label').textContent = 'Kembalian';
  }

  btn.disabled = cart.length === 0 || (bayar > 0 && kembalian < 0) || (bayar === 0 && cart.length > 0);
  if (cart.length > 0 && bayar === 0) btn.disabled = false;
}

// ===== PAYMENT =====
function processPayment() {
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const bayar = parseInt(document.getElementById('payInput').value) || 0;

  if (bayar > 0 && bayar < total) {
    showToast("❌ Pembayaran kurang!");
    return;
  }

  const kembalian = bayar > 0 ? bayar - total : 0;
  const itemCount = cart.reduce((s, c) => s + c.qty, 0);

  const rows = `
    <div class="receipt-row"><span class="r-label">Jumlah Item</span><span class="r-val">${itemCount} item</span></div>
    <div class="receipt-row"><span class="r-label">Total</span><span class="r-val">${formatRp(total)}</span></div>
    <div class="receipt-row"><span class="r-label">Bayar</span><span class="r-val">${bayar > 0 ? formatRp(bayar) : 'Tunai'}</span></div>
    <div class="receipt-row big"><span class="r-label">Kembalian</span><span class="r-val">${formatRp(kembalian)}</span></div>
  `;

  document.getElementById('receiptRows').innerHTML = rows;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  cart = [];
  document.getElementById('payInput').value = '';
  renderCart();
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ===== UTILS =====
function formatRp(n) {
  return 'Rp ' + n.toLocaleString('id-ID');
}

// ===== START =====
init();
</script>
